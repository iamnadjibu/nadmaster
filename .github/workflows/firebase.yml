name: NAD MASTER — Build & Deploy to Firebase

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ── Environment ───────────────────────────────────────────────────────────────
env:
  FIREBASE_PROJECT_ID: nadmaster

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build Android APK
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Write google-services.json from GitHub Secret
      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nad-master-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy Firestore Rules & Indexes to Firebase
  # ────────────────────────────────────────────────────────────────────────────
  deploy-firestore:
    name: Deploy Firestore Rules & Indexes
    runs-on: ubuntu-latest
    needs: build          # Only deploy after a successful build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NADMASTER }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore Rules
        run: |
          firebase deploy \
            --only firestore:rules,firestore:indexes \
            --project ${{ env.FIREBASE_PROJECT_ID }} \
            --non-interactive

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Distribute APK via Firebase App Distribution
  # ────────────────────────────────────────────────────────────────────────────
  distribute:
    name: Firebase App Distribution
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: nad-master-debug-apk
          path: artifacts/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NADMASTER }}

      - name: Upload APK to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId:          ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFile: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
          groups:         nad-testers
          file:           artifacts/app-debug.apk
          releaseNotes:   |
            NAD MASTER — Build from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Pushed by: ${{ github.actor }}
            ${{ github.event.head_commit.message }}
